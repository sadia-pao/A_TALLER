<!DOCTYPE html>
<html lang="en">
<html lang="es">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">


</head>

<body>

    <div class="contenedor">
        <div class="Tarea">
            <h2>Mis Tareas</h2>
            <i class="fa-solid fa-list"></i>

            <button>Todas las tareas</button>
            <button>Pendientes</button>
            <button>Completadas</button>
            <button>Calendario</button>
            <button>Estadísticas</button>
            <button>Ajustes</button>
        </div>

        <div>
            <i class="fa-solid fa-circle-user"></i>
            <h1>Agenda medica del dia</h1>
            <p>Cuidamos de tu salud y bienestar en un etorno moderno y acogedor</p>

            <div class="agregar">
                <input id="tarea" placeholder="¿Qué necesitas hacer?">

                <select id="prioridad">
                    <option>Baja</option>
                    <option selected>Media</option>
                    <option>Alta</option>
                </select>

                <input type="date" id="fecha">

                <button onclick="agregarTarea()">+ Agregar Cita</button>
            </div>


            <div class="filtros">
                <button onclick="filtrar('todas')">Todas</button>
                <button onclick="filtrar('pendientes')">Pendientes</button>
                <button onclick="filtrar('completadas')">Completadas</button>

                <div class="contador">
                    Total <span id="total">0</span> |
                    Pendientes <span id="pendientes">0</span> |
                    Completadas <span id="completadas">0</span>
                </div>


            </div>


            <div id="lista"></div>

            <div class="footer">
                <p>© 2024 Mis Tareas del Día | Hecho con ❤ por Estudiant@ Web</p>
            </div>

        </div>


    </div>

    <script src="java.js"></script>

</body>

</html>
